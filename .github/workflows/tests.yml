name: tests

on:
  push:
  pull_request:

jobs:
  pytest:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest matplotlib markdown pyparsing==2.4.7
          python -m pip install --no-deps fuzzingbook

      - name: Run tests
        env:
          PYTHONPATH: src
        run: |
          pytest -q